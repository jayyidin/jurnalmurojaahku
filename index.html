            const newClasses = [...classes]; const oldName = newClasses[index]; newClasses[index] = newVal;
            
            if (selectedClass === oldName) setSelectedClass(newVal);
            setClasses(newClasses);
            setHistory(history.map(h => h?.class === oldName ? { ...h, class: newVal } : h));
            if (isCloudReady) saveCoreToCloud(data, newClasses); 
            setEditingClassIdx(null); setEditClassText("");
          };
          const cancelEditClass = () => { setEditingClassIdx(null); setEditClassText(""); };

          const executeDelete = async () => {
             let newData = [...data];
             if (deleteConfig.type === 'history') {
                if (isCloudReady && db) { try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'murojaah_history', deleteConfig.id.toString())); } catch(e) {} } 
                else setHistory(history.filter(i => i?.id !== deleteConfig.id)); 
             } else if (deleteConfig.type === 'class') {
                const newClasses = classes.filter(c => c !== deleteConfig.name);
                setClasses(newClasses);
                if (selectedClass === deleteConfig.name) setSelectedClass(newClasses[0] || "");
                if (isCloudReady) saveCoreToCloud(data, newClasses);
             } else if (deleteConfig.type === 'ustadz') {
                newData = newData.filter(u => u?.id !== deleteConfig.id); 
             } else if (deleteConfig.type === 'halaqoh') {
                newData = newData.map(u => u?.id === deleteConfig.parentId ? { ...u, halaqohs: (u.halaqohs || []).filter(h => h?.id !== deleteConfig.id) } : u);
             } else if (deleteConfig.type === 'student') {
                newData = newData.map(u => u?.id === selectedUstadz?.id ? { ...u, halaqohs: (u.halaqohs || []).map(h => h?.id === selectedHalaqoh?.id ? { ...h, students: (h.students || []).filter(s => s !== deleteConfig.name) } : h) } : u);
             }
             
             if (['ustadz', 'halaqoh', 'student'].includes(deleteConfig.type)) { 
                 refreshSelectedData(newData); 
                 if (isCloudReady) saveCoreToCloud(newData, classes); 
             }
             setDeleteConfig({ show: false, type: null, id: null, name: '', parentId: null });
          };

          const handleSaveHistoryEdit = async (e) => {
              if (e && e.preventDefault) e.preventDefault(); 
              if (!editingHistoryItem?.id) return;
              setIsLoading(true);
              try {
                  const cleanPayload = JSON.parse(JSON.stringify(editingHistoryItem));
                  if (isCloudReady && firebaseUser && db) {
                      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'murojaah_history', cleanPayload.id.toString()), cleanPayload, { merge: true });
                  } else {
                      setHistory(history.map(h => h?.id === cleanPayload.id ? cleanPayload : h));
                  }
                  setShowEditHistoryModal(false); 
                  setEditingHistoryItem(null);
              } catch(err) {
                  alert("Gagal menyimpan perubahan: " + err.message);
              } finally { 
                  setIsLoading(false); 
              }
          };

          const handleLogoUpload = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              if (file.size > 1024 * 1024) return alert("Ukuran gambar terlalu besar! Maksimal 1MB.");
              const reader = new FileReader();
              reader.onloadend = () => {
                  const base64String = reader.result;
                  setSchoolLogo(base64String);
                  if (isCloudReady) saveCoreToCloud(data, classes, scriptUrl, welcomeBgUrl, schoolName, base64String);
              };
              reader.readAsDataURL(file);
          };

          const formatForDatetimeInput = (isoString) => {
              if (!isoString) return "";
              const d = new Date(isoString);
              if (isNaN(d.getTime())) return "";
              return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
          };

          const toggleSurah = (surah) => {
            if (selectedSurahs.includes(surah.number)) {
              setSelectedSurahs(selectedSurahs.filter(id => id !== surah.number));
              setSelectedRanges(prev => { const next = { ...prev }; delete next[surah.number]; return next; });
            } else { setActiveSurahForPicker(surah); setVerseInput({ start: '', end: '' }); setShowVerseModal(true); }
          };

          const handleVerseInputChange = (field, value) => { if (value === '' || (parseInt(value) > 0)) setVerseInput(prev => ({ ...prev, [field]: value })); };
          const saveVerseSelection = (isFullSurah = false) => {
            if (!activeSurahForPicker) return;
            const surahId = activeSurahForPicker.number;
            let rangeString = (!isFullSurah && verseInput.start) ? (verseInput.end && verseInput.start !== verseInput.end ? `Ayat ${verseInput.start}-${verseInput.end}` : `Ayat ${verseInput.start}`) : null;
            setSelectedSurahs([...selectedSurahs, surahId]);
            if (rangeString) setSelectedRanges({...selectedRanges, [surahId]: rangeString});
            setShowVerseModal(false); setActiveSurahForPicker(null);
          };

          const surahsDoneToday = useMemo(() => {
              if (!selectedStudent) return [];
              const todayStart = new Date(); 
              todayStart.setHours(0, 0, 0, 0);

              const done = new Set();
              history.forEach(h => {
                  if (h && h.student === selectedStudent && new Date(h.date) >= todayStart) {
                      if (Array.isArray(h.surahs)) {
                          h.surahs.forEach(s => done.add(s));
                      }
                  }
              });
              return Array.from(done);
          }, [history, selectedStudent]);

          const handleSaveSession = async () => {
            if (isLoading || !selectedStudent || !selectedClass || selectedSurahs.length === 0) return;
            const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
            const stdHistToday = history.filter(h => h?.student === selectedStudent && new Date(h.date) >= todayStart).sort((a, b) => new Date(b.date) - new Date(a.date));
            if (stdHistToday.length >= 2) return alert(`Ananda ${selectedStudent} sudah mencapai batas 2 kali murojaah hari ini.`);
            if (stdHistToday.length === 1 && (Date.now() - new Date(stdHistToday[0].date).getTime() < 3600000)) return alert(`Harap tunggu 1 jam untuk input murojaah kedua ananda ${selectedStudent}.`);

            setIsLoading(true); 
            
            let userIp = "Unknown IP";
            try { const ipRes = await fetch('https://api.ipify.org?format=json'); const ipData = await ipRes.json(); userIp = ipData.ip; } catch (e) {}
            const userDevice = navigator.userAgent;

            const surahDetails = [...selectedSurahs].sort((a, b) => a - b).map(num => {
                const name = getSurahName(num); const range = (selectedRanges || {})[num];
                return range ? `${name} (${range})` : name;
            }).join(", ");
            
            const uniqueId = Date.now().toString();
            const newEntry = {
              id: uniqueId, date: new Date().toISOString(), student: selectedStudent, class: selectedClass, ustadzName: selectedUstadz?.name || '',
              halaqohName: selectedHalaqoh?.name || '', surahs: [...selectedSurahs].sort((a, b) => a - b), ranges: { ...(selectedRanges || {}) }, ipAddress: userIp, userAgent: userDevice
            };
            
            if (isCloudReady && firebaseUser && db) { try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'murojaah_history', uniqueId), newEntry); } catch(e) {} } 
            else { setHistory(prev => [newEntry, ...(Array.isArray(prev) ? prev : [])]); }

            if (scriptUrl) {
              try {
                await fetch(scriptUrl, {
                  method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ date: new Date().toLocaleString('id-ID'), student: selectedStudent, class: selectedClass, ustadz: selectedUstadz?.name || '', halaqoh: selectedHalaqoh?.name || '', surahs: surahDetails })
                });
              } catch (e) {} 
            }

            setSelectedSurahs([]); setSelectedRanges({}); setSelectedStudent(""); setSelectedClass("");
            setIsLoading(false); setShowConfetti(true); setTimeout(() => { setShowConfetti(false); setCurrentView('history'); }, 1500);
          };

          const filteredSurahs = SURAH_LIST.filter(s => s.name.toLowerCase().includes((searchTerm || '').toLowerCase()) || s.number.toString().includes(searchTerm || ''));

                         <div className="flex items-center gap-1.5 min-w-0"><img src={data.find(u => u.name === item.ustadzName)?.gender === 'female' ? "https://cdn-icons-png.flaticon.com/512/5405/5405442.png" : "https://cdn-icons-png.flaticon.com/512/5403/5403148.png"} className="w-3.5 h-3.5 object-contain opacity-80 flex-shrink-0" alt="Ustadz" /> <span className="truncate font-medium">{item.ustadzName || '-'}</span></div>
                     </div>

                   <div className="flex sm:flex-row flex-col gap-1.5 flex-shrink-0">

                         </>
                       )}
                   </div>
                </div>
                <div className="flex flex-wrap gap-2 sm:gap-2.5 items-center">
                   {(item.surahs || []).map(num => (
                     <div key={num} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl border ${item.marks?.[num] ? 'border-green-400 dark:border-green-600 bg-green-50 dark:bg-green-500/10 ring-1 ring-green-400/30' : 'border-orange-100 dark:border-orange-500/20 bg-orange-50 dark:bg-orange-500/10'}`}>

                            {getSurahName(num)} {item.ranges?.[num] ? <span className={item.marks?.[num] ? "text-green-600 dark:text-green-500 text-[9px] sm:text-[10px] ml-1" : "text-orange-500 dark:text-orange-400 text-[9px] sm:text-[10px] ml-1"}>({item.ranges[num]})</span> : ''}
                         </span>
                         {item.marks?.[num] && (
                             <button onClick={(e) => { e.stopPropagation(); setInfoMsg(true); }} className="text-green-600 dark:text-green-400 hover:text-green-800 dark:hover:text-green-300 transition-colors p-0.5 rounded-full bg-green-200 dark:bg-green-800/60" title="Informasi Surat">
                                 <HelpCircle className="w-3.5 h-3.5" />
                             </button>

                {isAdmin && (item.ipAddress || item.userAgent) && (
                   <div className="mt-4 pt-3 border-t border-slate-50 dark:border-slate-700/50 flex flex-col gap-1.5">
                      <div className="flex items-start gap-1.5 text-[9px] text-slate-400 dark:text-slate-500 min-w-0"><Globe className="w-3 h-3 flex-shrink-0 text-blue-400" /> <span className="truncate font-mono">{item.ipAddress || 'Unknown'}</span></div>
                      <div className="flex items-start gap-1.5 text-[9px] text-slate-400 dark:text-slate-500 min-w-0"><Smartphone className="w-3 h-3 flex-shrink-0 text-purple-400" /> <span className="break-words line-clamp-2" title={item.userAgent}>{item.userAgent || 'Unknown Device'}</span></div>
                   </div>
                )}
             </div>
          );

          const HeaderUI = (title, subtitle) => (
            <div className="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-orange-100 dark:border-slate-800 text-slate-800 dark:text-slate-100 p-3 sm:p-4 md:p-6 shadow-sm rounded-b-[2rem] sm:rounded-b-[2.5rem] transition-all">

                <div className="flex items-center gap-2 sm:gap-3 overflow-hidden flex-1 min-w-0 mr-2">
                   <button onClick={handleBack} className="p-2 sm:p-2.5 md:p-3 bg-slate-100/80 dark:bg-slate-800 hover:bg-orange-50 dark:hover:bg-orange-500/20 hover:text-orange-600 dark:hover:text-orange-400 rounded-full transition-all duration-300 flex-shrink-0 text-slate-600 dark:text-slate-300 shadow-sm hover:shadow-md"><ArrowLeft className="w-4 h-4 sm:w-5 sm:h-5" /></button>
                   <div className="overflow-hidden flex-1 min-w-0 pl-1">
                     <h1 className="text-sm sm:text-base md:text-lg lg:text-xl font-extrabold truncate leading-tight bg-gradient-to-r from-orange-600 to-rose-500 dark:from-orange-400 dark:to-rose-400 bg-clip-text text-transparent">{title || ''}</h1>
                     {subtitle && <p className="text-slate-500 dark:text-slate-400 font-medium text-[9px] sm:text-[10px] md:text-xs truncate mt-0.5">{subtitle}</p>}
                   </div>
                </div>
                <div className="flex gap-1.5 sm:gap-2 flex-shrink-0 items-center">
                   {isAdmin && (
                       <div className="flex items-center gap-1 sm:gap-1.5">
                           <div className={`hidden md:flex items-center gap-1 px-2.5 py-1.5 rounded-full text-[10px] font-bold border ${cloudStatus === 'online' ? 'bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-800 text-green-600 dark:text-green-400' : 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-600 dark:text-red-400'}`} title={cloudStatus === 'online' ? "Database Cloud Aktif" : "Database Offline (Lokal)"}>{cloudStatus === 'online' ? <Cloud className="w-3 h-3"/> : <CloudOff className="w-3 h-3"/>}</div>
                           {isSuperAdmin && <button onClick={() => setShowGlobalTransferModal(true)} className="p-2 sm:p-2.5 rounded-2xl bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400 hover:bg-orange-500 hover:text-white transition-all flex-shrink-0" title="Mutasi Siswa Global"><ArrowRightLeft className="w-4 h-4 sm:w-5 sm:h-5" /></button>}
                           {isSuperAdmin && <button onClick={() => setShowBroadcastModal(true)} className="p-2 sm:p-2.5 rounded-2xl bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400 hover:bg-orange-500 hover:text-white transition-all flex-shrink-0"><Megaphone className="w-4 h-4 sm:w-5 sm:h-5" /></button>}
                           {isSuperAdmin && <button onClick={() => setShowSettingsModal(true)} className="p-2 sm:p-2.5 rounded-2xl bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400 hover:bg-orange-500 hover:text-white transition-all flex-shrink-0"><Settings className="w-4 h-4 sm:w-5 sm:h-5" /></button>}
                           <button onClick={() => setCurrentView('admin-dashboard')} className="p-2 sm:p-2.5 rounded-2xl bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400 hover:bg-orange-500 hover:text-white transition-all flex-shrink-0" title="Dashboard Admin"><LayoutDashboard className="w-4 h-4 sm:w-5 sm:h-5" /></button>
                       </div>
                   )}
                  <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 sm:p-2.5 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-md flex-shrink-0 bg-slate-100/80 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-orange-50 dark:hover:bg-orange-500/20 hover:text-orange-600 dark:hover:text-orange-400">
                      {isDarkMode ? <Sun className="w-4 h-4 sm:w-5 sm:h-5" /> : <Moon className="w-4 h-4 sm:w-5 sm:h-5" />}
                  </button>
                  <button onClick={isAdmin ? handleLogout : () => setShowLoginModal(true)} className={`p-2 sm:p-2.5 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-md flex-shrink-0 ${isAdmin ? 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-500 dark:hover:bg-red-500 hover:text-white dark:hover:text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-800 dark:hover:bg-slate-700 hover:text-white'}`}>
                    {isAdmin ? <LogOut className="w-4 h-4 sm:w-5 sm:h-5" /> : <Lock className="w-4 h-4 sm:w-5 sm:h-5" />}
                  </button>
                </div>
              </div>
            </div>
          );

          // =========================================================================================
          // STRUKTUR RENDER UTAMA YANG BERSIH TANPA DUPLIKASI
          // =========================================================================================
          return (
            <div className={`min-h-screen font-sans relative flex flex-col selection:bg-orange-200 selection:text-orange-900 ${currentView !== 'welcome' ? 'pb-36 sm:pb-28' : ''}`}>
              
              {/* GLOBAL UI ELEMENTS & NOTIFIKASI */}
              {activeBroadcast && (
                  <div className="fixed inset-0 z-[300] flex items-center justify-center bg-black/60 backdrop-blur-md p-4 animate-in fade-in">
                     <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative text-center transform transition-all animate-in zoom-in-95 border border-white/10">
                        <div className="w-14 h-14 sm:w-16 sm:h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Megaphone className="w-6 h-6 text-white animate-pulse" /></div>
                        <h3 className="text-xl sm:text-2xl font-bold mb-3">Pengumuman</h3>
                        <div className="bg-black/20 p-4 rounded-2xl mb-6 text-left whitespace-pre-wrap text-sm">{activeBroadcast.message}</div>
                        <button onClick={() => { localStorage.setItem('murojaah_last_broadcast', activeBroadcast.timestamp.toString()); setActiveBroadcast(null); }} className="w-full bg-white text-blue-700 font-extrabold py-3.5 sm:py-4 rounded-2xl shadow-lg hover:bg-blue-50 active:scale-95 transition-all text-sm sm:text-base">Tutup & Paham</button>
                     </div>
                  </div>
              )}

              {showConfetti && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/40 backdrop-blur-sm animate-in fade-in duration-300">
                   <div className="bg-white p-8 sm:p-10 rounded-[3rem] shadow-2xl text-center transform scale-110 mx-4 border border-slate-100">
                      <div className="w-20 h-20 sm:w-24 sm:h-24 bg-gradient-to-br from-orange-100 to-orange-50 rounded-[2rem] flex items-center justify-center mx-auto mb-5 sm:mb-6 shadow-inner"><BookOpen className="text-orange-600 animate-bounce w-10 h-10 sm:w-12 sm:h-12" /></div>
                      <h3 className="text-2xl sm:text-3xl font-extrabold mb-2 italic text-slate-800">Alhamdulillah!</h3>
                      <p className="text-sm sm:text-base font-medium text-slate-500">Data hafalan telah tersimpan.</p>
                   </div>
                </div>
              )}

              {infoMsg && (
                  <div className="fixed inset-0 z-[500] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in zoom-in duration-200">
                      <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-2xl max-w-xs w-full text-center border border-slate-100 dark:border-slate-700 relative">
                          <div className="w-12 h-12 bg-green-50 dark:bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-3 border border-green-100 dark:border-green-500/20">
                              <HelpCircle className="w-6 h-6 text-green-500" />
                          </div>
                          <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-2">Informasi Surat</h3>
                          <p className="text-sm font-medium text-slate-600 dark:text-slate-300 mb-5">Wajib surat yang sudah dihafal</p>
                          <button onClick={() => setInfoMsg(false)} className="w-full py-3 rounded-xl font-bold bg-slate-100 hover:bg-slate-200 text-slate-600 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-slate-300 transition-colors text-sm">Tutup</button>
                      </div>
                  </div>
              )}

              {/* WELCOME VIEW */}
              {currentView === 'welcome' && (
                  <div className="min-h-screen flex items-center justify-center p-4 text-white relative overflow-x-hidden font-sans py-12">
                     <div className="fixed top-0 left-0 w-full h-full z-0 bg-cover bg-center bg-no-repeat" style={{ backgroundImage: `url('${(welcomeBgUrl || '').trim() || 'https://images.unsplash.com/photo-1609599006353-e629aaabfeae?q=80&w=1920&auto=format&fit=crop'}')` }}></div>
                     <div className="fixed top-0 left-0 w-full h-full z-0 bg-black/75 backdrop-blur-[2px]"></div>
                     
                     {notifPermission !== 'granted' && "Notification" in window && (
                         <button onClick={requestNotificationPermission} className="absolute top-4 right-4 z-50 flex items-center gap-1.5 bg-black/40 hover:bg-black/60 backdrop-blur-md text-white text-[10px] sm:text-xs px-3 py-1.5 rounded-full border border-white/20 transition-all shadow-lg"><BellRing className="w-3 h-3 sm:w-3.5 sm:h-3.5 text-orange-400" /> Izinkan Notif</button>
                     )}

                     <button onClick={() => setIsDarkMode(!isDarkMode)} className="absolute top-4 left-4 z-50 flex items-center justify-center bg-black/40 hover:bg-black/60 backdrop-blur-md text-white px-3 py-1.5 rounded-full border border-white/20 transition-all shadow-lg">
                        {isDarkMode ? <Sun className="w-4 h-4 text-yellow-400" /> : <Moon className="w-4 h-4 text-slate-200" />}
                     </button>

                     <div className="relative z-10 w-full max-w-md animate-in fade-in zoom-in duration-700 mt-4 mb-8">
                        <div className="bg-white/10 backdrop-blur-md border border-white/20 p-6 sm:p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center text-center">
                           <div className="bg-white p-2 sm:p-3 rounded-2xl shadow-lg mb-5 w-full max-w-[280px]">
                              <img src={(schoolLogo || '').trim() || "./logo.png"} onError={(e) => { e.target.style.display = 'none'; }} alt="Logo Sekolah" className="h-10 sm:h-14 w-full object-contain" />
                           </div>
                           <div className="mb-1"><h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-white tracking-tight">Jurnal Murojaahku</h1></div>
                           <p className="text-sm sm:text-base text-orange-200 font-medium mb-6 tracking-wide">{schoolName}</p>

                           <div className="bg-black/20 p-4 sm:p-5 rounded-2xl w-full mb-6 border border-white/5 relative">
                              <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-orange-500 text-white text-[9px] sm:text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">Hadits</div>
                              <p className="text-xs sm:text-sm md:text-base font-serif italic mb-2 text-orange-50 leading-relaxed mt-2">"Sebaik-baik kalian adalah yang belajar Al-Qur'an dan mengajarkannya."</p>
                              <p className="text-[9px] sm:text-[10px] text-orange-300 font-bold tracking-widest uppercase">(HR. Bukhari no. 5027)</p>
                           </div>

                           <button onClick={() => setCurrentView('select-ustadz')} className="group w-full bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-400 hover:to-orange-500 text-white py-3 sm:py-4 rounded-xl font-bold text-base sm:text-lg shadow-xl flex items-center justify-center gap-3 transition-all transform hover:scale-[1.02] active:scale-95 mb-4">
                              Mulai Murojaah <ArrowRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                           </button>

                           {topStudents.length > 0 && (
                              <div className="w-full bg-black/30 rounded-2xl p-4 sm:p-5 border border-white/10 relative mt-2">
                                 <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-yellow-500 to-amber-500 text-yellow-950 px-3 sm:px-4 py-1.5 rounded-full font-bold text-[10px] sm:text-xs uppercase tracking-wider flex items-center gap-1 shadow-lg whitespace-nowrap"><Medal className="w-3 h-3 sm:w-4 sm:h-4" /> Bintang Murojaah</div>
                                 <div className="space-y-2 mt-4 max-h-64 overflow-y-auto custom-scrollbar pr-1">
                                    {topStudents.map((user, idx) => (
                                       <div key={idx} className="flex items-center justify-between bg-white/5 hover:bg-white/10 transition-colors p-2.5 sm:p-3 rounded-xl border border-white/5 gap-2">
                                          <div className="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
                                             <div className={`w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center rounded-full text-[10px] sm:text-xs font-bold shadow-sm flex-shrink-0 ${idx === 0 ? 'bg-yellow-400 text-yellow-900 ring-2 ring-yellow-400/50' : idx === 1 ? 'bg-slate-300 text-slate-800' : idx === 2 ? 'bg-amber-600 text-amber-50' : 'bg-white/10 text-white'}`}>{idx + 1}</div>
                                             <div className="text-left flex-1 min-w-0">
                                                <div className="text-[11px] sm:text-xs md:text-sm font-bold text-white line-clamp-2 leading-tight">{user?.student || 'Siswa'}</div>
                                                <div className="text-[9px] sm:text-[10px] text-orange-200 truncate mt-0.5">{user?.class || '-'}</div>
                                             </div>
                                          </div>
                                          <div className="text-right flex flex-col justify-center flex-shrink-0 pl-2">
                                             <div className="text-[11px] sm:text-xs font-bold text-yellow-400">{user?.totalPoints || 0} Poin</div>
                                             <div className="text-[8px] sm:text-[9px] text-white/60">{user?.surahCount || 0} Surat</div>
                                          </div>
                                       </div>
                                    ))}
                                 </div>
                              </div>
                           )}
                        </div>
                     </div>
                     <div className="absolute bottom-4 sm:bottom-6 left-0 right-0 text-center text-white/60 text-[10px] sm:text-xs font-medium z-20 px-4 flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 tracking-wide">
                        <span>&copy; {new Date().getFullYear()} Juman Jayyidin.</span><span className="hidden sm:inline">|</span><span>All rights reserved.</span>
                     </div>
                  </div>
              )}


              {/* ========================================================= */}
              {/* 3. MODAL KUMPULAN AKSES ADMIN                             */}
              {/* ========================================================= */}
              
              {showLoginModal && (
                <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/60 backdrop-blur-md p-4 animate-in fade-in zoom-in duration-200">
                  <div className="bg-white dark:bg-slate-800 p-8 sm:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm relative overflow-hidden border border-slate-100 dark:border-slate-700">
                    <div className="absolute -top-24 -right-24 w-48 h-48 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>
                    <div className="absolute -bottom-24 -left-24 w-48 h-48 bg-rose-500/10 rounded-full blur-3xl pointer-events-none"></div>
                    <button onClick={() => { setShowLoginModal(false); setLoginError(false); setShowPassword(false); }} className="absolute top-5 right-5 p-2 bg-slate-50 dark:bg-slate-700/50 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all z-10"><X className="w-5 h-5" /></button>
                    <div className="text-center mb-8 relative z-10">
                      <div className="w-16 h-16 bg-gradient-to-br from-orange-100 to-orange-50 dark:from-slate-700 dark:to-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-inner border border-orange-200/50 dark:border-slate-600"><Lock className="w-8 h-8 text-orange-600 dark:text-orange-500" /></div>
                      <h2 className="text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tight">Area Admin</h2>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-2 font-medium">Silakan masuk untuk mengelola sistem</p>
                    </div>
                    {loginError && (
                        <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-600 dark:text-red-400 p-3.5 rounded-2xl mb-6 text-xs font-bold flex items-center gap-2.5 animate-in slide-in-from-top-2 relative z-10"><AlertTriangle className="w-4 h-4 flex-shrink-0" /> Username atau Password salah!</div>
                    )}
                    <form onSubmit={handleLogin} className="space-y-4 relative z-10">
                      <div className="relative group">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><User className="h-5 w-5 text-slate-400 group-focus-within:text-orange-500 transition-colors" /></div>
                          <input type="text" value={loginForm.username} onChange={e=>{setLoginForm({...loginForm, username:e.target.value}); setLoginError(false);}} className="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none text-sm text-slate-800 dark:text-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium" placeholder="Username" autoFocus />
                      </div>
                      <div className="relative group">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Lock className="h-5 w-5 text-slate-400 group-focus-within:text-orange-500 transition-colors" /></div>
                          <input type={showPassword ? "text" : "password"} value={loginForm.password} onChange={e=>{setLoginForm({...loginForm, password:e.target.value}); setLoginError(false);}} className="w-full pl-11 pr-12 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none text-sm text-slate-800 dark:text-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium" placeholder="Password" />
                          <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">{showPassword ? <EyeOff className="h-5 w-5" /> : <Eye className="h-5 w-5" />}</button>
                      </div>
                      <button type="submit" className="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-extrabold py-4 rounded-2xl shadow-[0_8px_20px_-6px_rgba(234,88,12,0.5)] transform transition-all active:scale-95 text-sm mt-6 flex items-center justify-center gap-2">Masuk Sistem <ArrowRight className="w-4 h-4" /></button>
                    </form>
                  </div>
                </div>
              )}

              {/* PENGATURAN UTAMA ADMIN */}
              {showSettingsModal && isSuperAdmin && (
                <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                  <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] w-full max-w-md relative flex flex-col max-h-[85vh] shadow-2xl">
                     <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4">
                         <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100"><Settings className="w-5 h-5 text-orange-500" /> Pengaturan</h2>
                         <button onClick={() => setShowSettingsModal(false)} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600"><X className="w-4 h-4" /></button>
                     </div>
                     <div className="overflow-y-auto flex-1 pr-2 custom-scrollbar space-y-6">
                         <div className="space-y-3">
                            <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-3"><School className="w-3.5 h-3.5" /> Identitas Sekolah</h3>
                            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 space-y-4">
                               <div>
                                   <label className="block text-[10px] font-bold text-slate-500 mb-2">Nama Sekolah / Instansi</label>
                                   <input type="text" value={schoolName} onChange={(e) => { setSchoolName(e.target.value); if (isCloudReady) saveCoreToCloud(data, classes, scriptUrl, welcomeBgUrl, e.target.value, schoolLogo); }} placeholder="SDIT Al Fityan School Bogor" className="w-full px-3.5 py-3 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-xs focus:ring-2 focus:ring-orange-500 outline-none" />
                               </div>
                               <div>
                                   <label className="block text-[10px] font-bold text-slate-500 mb-2">Logo Sekolah (Maks 1MB)</label>
                                   <div className="flex items-center gap-3">
                                       <div className="w-12 h-12 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 flex items-center justify-center overflow-hidden flex-shrink-0 shadow-inner"><img src={schoolLogo || "./logo.png"} onError={(e) => { e.target.style.display = 'none'; }} alt="Logo" className="w-8 h-8 object-contain" /></div>
                                       <div className="flex-1"><input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-xs text-slate-500 file:cursor-pointer file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-[10px] file:font-bold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 outline-none" /></div>
                                   </div>
                               </div>
                            </div>
                         </div>
                         <div className="space-y-3">
                            <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-3"><Calendar className="w-3.5 h-3.5" /> Periode / Reset Poin</h3>
                            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                               <label className="block text-[10px] font-bold text-slate-500 mb-2">Tanggal Mulai Hitung Poin (Tahun Ajaran Baru)</label>
                               <input type="date" value={activePeriodStart} onChange={(e) => { setActivePeriodStart(e.target.value); if (isCloudReady) saveCoreToCloud(data, classes, scriptUrl, welcomeBgUrl, schoolName, schoolLogo, e.target.value); }} className="w-full px-3.5 py-3 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-xs focus:ring-2 focus:ring-orange-500 outline-none" />
                               <p className="text-[9px] mt-2.5 text-slate-500 leading-relaxed">Poin di papan peringkat akan dihitung ulang (0) mulai dari tanggal ini. Riwayat murojaah sebelumnya tetap utuh dan tersimpan di menu Riwayat.</p>
                            </div>
                         </div>
                         <div className="space-y-3">
                            <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-3"><ImageIcon className="w-3.5 h-3.5" /> Background Beranda</h3>
                            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                               <label className="block text-[10px] font-bold text-slate-500 mb-2">URL Gambar</label>
                               <input type="text" value={welcomeBgUrl} onChange={(e) => { setWelcomeBgUrl(e.target.value); if (isCloudReady) saveCoreToCloud(data, classes, scriptUrl, e.target.value, schoolName, schoolLogo); }} placeholder="https://contoh.com/gambar.jpg" className="w-full px-3.5 py-3 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-xs focus:ring-2 focus:ring-orange-500 outline-none" />
                            </div>
                         </div>
                         <div className="space-y-3">
                            <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-3"><Database className="w-3.5 h-3.5" /> Integrasi Backup</h3>
                            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                               <label className="block text-[10px] font-bold text-slate-500 mb-2">URL Web App Google Sheets</label>
                               <input type="text" value={scriptUrl} onChange={(e) => saveScriptUrl(e.target.value)} placeholder="https://script.google.com/..." className="w-full px-3.5 py-3 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-xs focus:ring-2 focus:ring-orange-500 outline-none" />
                            </div>
                         </div>
                         <div className="space-y-3">
                            <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Data Master Kelas</h3>
                            <form onSubmit={handleAddClass} className="flex gap-2">
                              <input type="text" value={classForm} onChange={(e) => setClassForm(e.target.value)} className="flex-1 px-4 py-3 rounded-2xl bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 text-xs focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Nama Kelas Baru..." />
                              <button type="submit" disabled={!classForm.trim()} className="bg-orange-600 text-white px-4 py-3 rounded-2xl font-bold disabled:opacity-50 shadow-md"><PlusCircle className="w-4 h-4" /></button>
                            </form>
                            <div className="space-y-2 mt-4 bg-slate-50 dark:bg-slate-900 p-3 rounded-2xl border border-slate-100 dark:border-slate-700">
                              {classes.map((cls, idx) => (
                                <div key={idx} className="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-xl shadow-sm">
                                  {editingClassIdx === idx ? (
                                    <div className="flex gap-2 w-full">
                                       <input type="text" value={editClassText} onChange={(e) => setEditClassText(e.target.value)} className="flex-1 px-3 py-2 text-xs bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500 rounded-lg" autoFocus />
                                       <button onClick={() => saveClassEdit(idx)} className="text-green-600 p-2 bg-green-50 rounded-lg"><Check className="w-4 h-4" /></button>
                                       <button onClick={cancelEditClass} className="text-slate-400 p-2 bg-slate-100 rounded-lg"><X className="w-4 h-4" /></button>
                                    </div>
                                  ) : (
                                    <>
                                      <span className="font-extrabold text-slate-700 dark:text-slate-200 text-xs">{cls}</span>
                                      <div className="flex gap-1.5">
                                        <button onClick={() => startEditingClass(idx)} className="p-2 text-slate-400 hover:text-orange-600 rounded-lg"><Pencil className="w-3.5 h-3.5" /></button>
                                        <button onClick={() => setDeleteConfig({ show: true, type: 'class', name: cls })} className="p-2 text-slate-400 hover:text-red-600 rounded-lg"><Trash2 className="w-3.5 h-3.5" /></button>
                                      </div>
                                    </>
                                  )}
                                </div>
                              ))}
                            </div>
                         </div>
                     </div>
                     <div className="mt-6 pt-4 border-t border-slate-100 dark:border-slate-700">
                        <button onClick={() => setShowSettingsModal(false)} className="w-full bg-slate-800 dark:bg-slate-700 text-white font-extrabold py-3.5 rounded-2xl shadow-lg hover:bg-slate-700 text-sm">Tutup</button>
                     </div>
                  </div>
                </div>
              )}

              {/* BUAT PENGUMUMAN */}
              {showBroadcastModal && isSuperAdmin && (
                <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                  <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative">
                    <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4">
                      <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100"><Megaphone className="w-5 h-5 text-orange-500" /> Buat Pengumuman</h2>
                      <button onClick={() => setShowBroadcastModal(false)} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600 transition-colors"><X className="w-4 h-4" /></button>
                    </div>
                    <div className="space-y-4">
                      <textarea value={broadcastMessage} onChange={(e) => setBroadcastMessage(e.target.value)} placeholder="Ketik isi pengumuman untuk semua pengguna di sini..." className="w-full px-4 py-3 rounded-2xl bg-slate-50 dark:bg-slate-900 outline-none text-sm text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-orange-500 min-h-[120px] resize-none custom-scrollbar"></textarea>
                      <button onClick={handleSendBroadcast} disabled={isLoading || !broadcastMessage.trim()} className="w-full bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl shadow-lg hover:bg-orange-500 transition-all text-sm flex items-center justify-center gap-2 disabled:opacity-50">
                          {isLoading ? <Loader2 className="animate-spin w-4 h-4" /> : <Send className="w-4 h-4" />} Kirim Pengumuman
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* KELOLA SISWA */}
              {showManageStudentModal && isSuperAdmin && (
                <div className="fixed inset-0 z-[160] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                  <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] w-full max-w-md relative flex flex-col max-h-[85vh] shadow-2xl">
                    <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4">
                      <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100"><UserCog className="w-5 h-5 text-orange-500" /> Kelola Siswa</h2>
                      <button onClick={() => setShowManageStudentModal(false)} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600"><X className="w-4 h-4" /></button>
                    </div>
                    <form onSubmit={handleAddStudent} className="flex gap-2 mb-5">
                      <input type="text" value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} className="flex-1 px-4 py-3 rounded-2xl bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 text-xs focus:ring-2 focus:ring-orange-500 outline-none font-medium" placeholder="Ketik nama siswa baru..." />
                      <button type="submit" className="bg-orange-600 text-white px-4 py-3 rounded-2xl font-bold shadow-md disabled:opacity-50"><PlusCircle className="w-4 h-4" /></button>
                    </form>
                    <div className="overflow-y-auto flex-1 pr-1 custom-scrollbar space-y-2 bg-slate-50 dark:bg-slate-900 p-3 rounded-2xl border border-slate-100 dark:border-slate-700">
                      {(selectedHalaqoh?.students || []).map((student, idx) => (
                        <div key={idx} className="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 hover:border-orange-200">
                          {editingStudentIndex === idx ? (
                            <div className="flex gap-2 w-full">
                               <input type="text" value={editStudentValue} onChange={(e) => setEditStudentValue(e.target.value)} className="flex-1 px-3 py-2 text-xs bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500 font-bold rounded-lg" autoFocus />
                               <button onClick={() => saveEditStudent(idx)} className="text-green-600 p-2 bg-green-50 rounded-lg"><Check className="w-4 h-4" /></button>
                               <button onClick={() => setEditingStudentIndex(null)} className="text-slate-400 p-2 bg-slate-100 rounded-lg"><X className="w-4 h-4" /></button>
                            </div>
                          ) : (
                            <>
                              <span className="font-extrabold text-slate-700 dark:text-slate-200 text-xs truncate mr-2">{student}</span>
                              <div className="flex gap-1 flex-shrink-0 items-center bg-slate-50 dark:bg-slate-900 p-1 rounded-lg border border-slate-100 dark:border-slate-700">
                                <button onClick={() => handleMoveStudent(idx, 'up')} disabled={idx === 0} className="p-1.5 text-slate-400 hover:text-slate-700 disabled:opacity-30 rounded-md"><ArrowUp className="w-3.5 h-3.5" /></button>
                                <button onClick={() => handleMoveStudent(idx, 'down')} disabled={idx === selectedHalaqoh.students.length - 1} className="p-1.5 text-slate-400 hover:text-slate-700 disabled:opacity-30 rounded-md"><ArrowDown className="w-3.5 h-3.5" /></button>
                                <div className="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
                                <button onClick={() => openTransferModal(student)} className="p-1.5 text-orange-500 hover:bg-orange-100 rounded-md" title="Pindah Halaqoh"><MoveRight className="w-3.5 h-3.5" /></button>
                                <button onClick={() => startEditingStudent(idx)} className="p-1.5 text-blue-500 hover:bg-blue-100 rounded-md"><Pencil className="w-3.5 h-3.5" /></button>
                                <button onClick={() => setDeleteConfig({ show: true, type: 'student', name: student })} className="p-1.5 text-red-500 hover:bg-red-100 rounded-md"><Trash2 className="w-3.5 h-3.5" /></button>
                              </div>
                            </>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL PINDAH HALAQOH/USTADZ (INDIVIDU) */}
              {showTransferModal && isSuperAdmin && (
                  <div className="fixed inset-0 z-[500] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                      <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative border border-slate-100 dark:border-slate-700">
                          <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4">
                              <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100"><MoveRight className="w-5 h-5 text-orange-500" /> Pindah Halaqoh</h2>
                              <button onClick={() => setShowTransferModal(false)} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600 transition-colors"><X className="w-4 h-4" /></button>
                          </div>
                          <form onSubmit={executeTransferStudent} className="space-y-4">
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Siswa</label>
                                  <input type="text" value={transferData.studentName} disabled className="w-full px-4 py-3.5 rounded-2xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm text-slate-500 dark:text-slate-400 font-medium cursor-not-allowed" />
                              </div>
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Pengajar Tujuan</label>
                                  <div className="relative">
                                      <select value={transferData.targetUstadzId} onChange={(e) => setTransferData({...transferData, targetUstadzId: e.target.value, targetHalaqohId: ''})} className="w-full appearance-none px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none text-sm text-slate-800 dark:text-slate-200 focus:border-orange-500 font-medium cursor-pointer" required>
                                          <option value="" disabled>-- Pilih Pengajar --</option>
                                          {data.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                      </select>
                                      <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" />
                                  </div>
                              </div>
                              {transferData.targetUstadzId && (
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Halaqoh Tujuan</label>
                                      <div className="relative">
                                          <select value={transferData.targetHalaqohId} onChange={(e) => setTransferData({...transferData, targetHalaqohId: e.target.value})} className="w-full appearance-none px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none text-sm text-slate-800 dark:text-slate-200 focus:border-orange-500 font-medium cursor-pointer" required>
                                              <option value="" disabled>-- Pilih Halaqoh --</option>
                                              {(data.find(u => u.id === transferData.targetUstadzId)?.halaqohs || []).map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                                          </select>
                                          <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" />
                                      </div>
                                  </div>
                              )}
                              <button type="submit" disabled={!transferData.targetUstadzId || !transferData.targetHalaqohId} className="w-full bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl shadow-lg hover:bg-orange-500 transition-all text-sm mt-4 disabled:opacity-50">Pindahkan Siswa</button>
                          </form>
                      </div>
                  </div>
              )}

              {/* MODAL MUTASI (PINDAH SISWA GLOBAL BANYAK DARI HEADER) */}
              {showGlobalTransferModal && isSuperAdmin && (
                  <div className="fixed inset-0 z-[500] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                      <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative border border-slate-100 dark:border-slate-700">
                          <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4">
                              <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100"><ArrowRightLeft className="w-5 h-5 text-orange-500" /> Mutasi Siswa</h2>
                              <button onClick={() => setShowGlobalTransferModal(false)} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600 transition-colors"><X className="w-4 h-4" /></button>
                          </div>
                          <form onSubmit={executeGlobalTransferStudent} className="space-y-4">
                              {/* ASAL */}
                              <div className="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700">
                                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">1. Pilih Asal</p>
                                  <div className="space-y-2">
                                      <select value={globalTransferData.sourceUstadzId} onChange={(e) => setGlobalTransferData({...globalTransferData, sourceUstadzId: e.target.value, sourceHalaqohId: '', selectedStudents: []})} className="w-full text-xs font-medium p-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:border-orange-500 cursor-pointer">
                                          <option value="" disabled>-- Pilih Pengajar Asal --</option>
                                          {data.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                      </select>
                                      {globalTransferData.sourceUstadzId && (
                                          <select value={globalTransferData.sourceHalaqohId} onChange={(e) => setGlobalTransferData({...globalTransferData, sourceHalaqohId: e.target.value, selectedStudents: []})} className="w-full text-xs font-medium p-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:border-orange-500 cursor-pointer">
                                              <option value="" disabled>-- Pilih Halaqoh Asal --</option>
                                              {(data.find(u => u.id === globalTransferData.sourceUstadzId)?.halaqohs || []).map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                                          </select>
                                      )}
                                      
                                      {globalTransferData.sourceHalaqohId && (() => {
                                          const sourceUstadz = data.find(u => u.id === globalTransferData.sourceUstadzId);
                                          const sourceHalaqoh = sourceUstadz?.halaqohs?.find(h => h.id === globalTransferData.sourceHalaqohId);
                                          const availableStudents = sourceHalaqoh?.students || [];

                                          return (
                                              <div className="mt-3 pt-2 border-t border-slate-200 dark:border-slate-700">
                                                  <div className="flex justify-between items-center mb-1.5 px-1">
                                                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Pilih Siswa</label>
                                                      <button 
                                                          type="button" 
                                                          onClick={() => {
                                                              if (globalTransferData.selectedStudents.length === availableStudents.length) {
                                                                  setGlobalTransferData({...globalTransferData, selectedStudents: []});
                                                              } else {
                                                                  setGlobalTransferData({...globalTransferData, selectedStudents: [...availableStudents]});
                                                              }
                                                          }} 
                                                          className="text-[10px] text-orange-600 dark:text-orange-400 font-bold hover:underline"
                                                      >
                                                          {globalTransferData.selectedStudents.length === availableStudents.length ? 'Batal Semua' : 'Pilih Semua'}
                                                      </button>
                                                  </div>
                                                  <div className="max-h-32 overflow-y-auto custom-scrollbar bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-1.5 space-y-0.5">
                                                      {availableStudents.length === 0 ? (
                                                          <div className="text-xs text-slate-400 text-center py-2">Tidak ada siswa</div>
                                                      ) : (
                                                          availableStudents.map(s => (
                                                              <label key={s} className="flex items-center gap-2.5 p-2 hover:bg-orange-50 dark:hover:bg-slate-700 rounded-md cursor-pointer transition-colors">
                                                                  <input 
                                                                      type="checkbox" 
                                                                      checked={globalTransferData.selectedStudents.includes(s)}
                                                                      onChange={(e) => {
                                                                          const newSel = e.target.checked 
                                                                              ? [...globalTransferData.selectedStudents, s] 
                                                                              : globalTransferData.selectedStudents.filter(name => name !== s);
                                                                          setGlobalTransferData({...globalTransferData, selectedStudents: newSel});
                                                                      }}
                                                                      className="w-4 h-4 text-orange-500 rounded border-slate-300 focus:ring-orange-500 bg-white" 
                                                                  />
                                                                  <span className="text-xs font-bold text-slate-700 dark:text-slate-200 truncate">{s}</span>
                                                              </label>
                                                          ))
                                                      )}
                                                  </div>
                                                  <div className="text-[10px] text-slate-500 mt-1.5 px-1 font-medium">{globalTransferData.selectedStudents.length} siswa dipilih</div>
                                              </div>
                                          );
                                      })()}
                                  </div>
                              </div>

                              {/* TUJUAN */}
                              <div className="p-3 bg-orange-50 dark:bg-orange-900/10 rounded-xl border border-orange-100 dark:border-orange-900/30">
                                  <p className="text-[10px] font-bold text-orange-600 dark:text-orange-400 uppercase tracking-widest mb-2">2. Pindah Ke Tujuan</p>
                                  <div className="space-y-2">
                                      <select value={globalTransferData.targetUstadzId} onChange={(e) => setGlobalTransferData({...globalTransferData, targetUstadzId: e.target.value, targetHalaqohId: ''})} className="w-full text-xs font-medium p-2.5 rounded-lg bg-white dark:bg-slate-800 border border-orange-200 dark:border-orange-800/50 outline-none focus:border-orange-500 cursor-pointer">
                                          <option value="" disabled>-- Pilih Pengajar Tujuan --</option>
                                          {data.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                      </select>
                                      {globalTransferData.targetUstadzId && (
                                          <select value={globalTransferData.targetHalaqohId} onChange={(e) => setGlobalTransferData({...globalTransferData, targetHalaqohId: e.target.value})} className="w-full text-xs font-medium p-2.5 rounded-lg bg-white dark:bg-slate-800 border border-orange-200 dark:border-orange-800/50 outline-none focus:border-orange-500 cursor-pointer">
                                              <option value="" disabled>-- Pilih Halaqoh Tujuan --</option>
                                              {(data.find(u => u.id === globalTransferData.targetUstadzId)?.halaqohs || []).map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                                          </select>
                                      )}
                                  </div>
                              </div>

                              <button type="submit" disabled={globalTransferData.selectedStudents.length === 0 || !globalTransferData.targetHalaqohId} className="w-full bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl shadow-lg hover:bg-orange-500 transition-all text-sm mt-4 disabled:opacity-50">Eksekusi Pindah Siswa</button>
                          </form>
                      </div>
                  </div>
              )}

              {/* TAMBAH/EDIT USTADZ */}
              {showUstadzModal && isSuperAdmin && (
                  <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                      <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative border border-slate-100 dark:border-slate-700">
                          <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4">
                              <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100">
                                  <UserCog className="w-5 h-5 text-orange-500" /> {ustadzForm.id ? 'Edit Pengajar' : 'Tambah Pengajar'}
                              </h2>
                              <button onClick={() => setShowUstadzModal(false)} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600 transition-colors"><X className="w-4 h-4" /></button>
                          </div>
                          <form onSubmit={saveUstadz} className="space-y-4">
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Nama Pengajar</label>
                                  <input type="text" value={ustadzForm.name} onChange={(e) => setUstadzForm({...ustadzForm, name: e.target.value})} className="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none text-sm text-slate-800 dark:text-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium" placeholder="Contoh: Ustadz Fulan" autoFocus required />
                              </div>
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Jenis Kelamin</label>
                                  <div className="flex gap-3">
                                      <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border-2 cursor-pointer transition-all ${ustadzForm.gender === 'male' ? 'border-orange-500 bg-orange-50 dark:bg-orange-500/10 text-orange-700 dark:text-orange-400' : 'border-slate-200 dark:border-slate-700 text-slate-500'}`}>
                                          <input type="radio" name="gender" value="male" checked={ustadzForm.gender === 'male'} onChange={(e) => setUstadzForm({...ustadzForm, gender: e.target.value})} className="hidden" />
                                          <img src="https://cdn-icons-png.flaticon.com/512/5403/5403148.png" className="w-5 h-5 opacity-80" /> Ustadz
                                      </label>
                                      <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border-2 cursor-pointer transition-all ${ustadzForm.gender === 'female' ? 'border-orange-500 bg-orange-50 dark:bg-orange-500/10 text-orange-700 dark:text-orange-400' : 'border-slate-200 dark:border-slate-700 text-slate-500'}`}>
                                          <input type="radio" name="gender" value="female" checked={ustadzForm.gender === 'female'} onChange={(e) => setUstadzForm({...ustadzForm, gender: e.target.value})} className="hidden" />
                                          <img src="https://cdn-icons-png.flaticon.com/512/5405/5405442.png" className="w-5 h-5 opacity-80" /> Ustadzah
                                      </label>
                                  </div>
                              </div>
                              <button type="submit" disabled={!ustadzForm.name.trim()} className="w-full bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl shadow-lg hover:bg-orange-500 transition-all text-sm mt-4 disabled:opacity-50">Simpan Data</button>
                          </form>
                      </div>
                  </div>
              )}

              {/* EDIT RIWAYAT MUROJAAH (CLEAN PAYLOAD & ERROR HANDLING) */}
              {showEditHistoryModal && editingHistoryItem && isAdmin && (
                  <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                      <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-md relative border border-slate-100 dark:border-slate-700 max-h-[90vh] flex flex-col">
                          <div className="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4 flex-shrink-0">
                              <h2 className="text-lg sm:text-xl font-extrabold flex items-center gap-2.5 text-slate-800 dark:text-slate-100">
                                  <Edit2 className="w-5 h-5 text-orange-500" /> Edit Riwayat
                              </h2>
                              <button onClick={() => { setShowEditHistoryModal(false); setEditingHistoryItem(null); }} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-full text-slate-400 hover:text-orange-600 transition-colors"><X className="w-4 h-4" /></button>
                          </div>
                          <div className="overflow-y-auto custom-scrollbar pr-2 space-y-4 flex-1 mb-4">
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Tanggal & Waktu</label>
                                  <input type="datetime-local" value={formatForDatetimeInput(editingHistoryItem.date)} onChange={(e) => { const nd = new Date(e.target.value); if(!isNaN(nd.getTime())) setEditingHistoryItem({...editingHistoryItem, date: nd.toISOString()}); }} className="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none text-sm text-slate-800 dark:text-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium" />
                              </div>
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">Siswa</label>
                                  <input type="text" value={editingHistoryItem.student} disabled className="w-full px-4 py-3.5 rounded-2xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm text-slate-500 dark:text-slate-400 opacity-70 cursor-not-allowed font-medium" />
                              </div>
                              <div>
                                  <label className="block text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-wider">Daftar Surat & Marking</label>
                                  <div className="space-y-3">
                                      {(editingHistoryItem.surahs || []).map(num => (
                                          <div key={num} className="bg-slate-50 dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                              <p className="text-sm font-extrabold text-slate-800 dark:text-slate-200 mb-3">{getSurahName(num)}</p>
                                              <div className="space-y-3">
                                                  <input type="text" placeholder="Rentang Ayat (opsional, misal: 1-5)" value={editingHistoryItem.ranges?.[num] || ''} onChange={(e) => setEditingHistoryItem({...editingHistoryItem, ranges: {...(editingHistoryItem.ranges || {}), [num]: e.target.value}})} className="w-full px-3 py-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 outline-none text-xs text-slate-800 dark:text-slate-200 focus:border-orange-500 transition-all font-medium" />
                                                  <label className="flex items-start gap-2.5 cursor-pointer">
                                                      <input type="checkbox" checked={!!editingHistoryItem.marks?.[num]} onChange={(e) => setEditingHistoryItem({...editingHistoryItem, marks: {...(editingHistoryItem.marks || {}), [num]: e.target.checked}})} className="mt-0.5 w-4 h-4 text-orange-500 rounded border-slate-300 focus:ring-orange-500" />
                                                      <span className="text-[11px] font-bold text-slate-600 dark:text-slate-400 leading-tight flex-1">Tandai: Wajib surat yang sudah dihafal</span>
                                                  </label>
                                              </div>
                                          </div>
                                      ))}
                                  </div>
                              </div>
                          </div>
                          <button onClick={handleSaveHistoryEdit} disabled={isLoading} className="w-full bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl shadow-lg hover:bg-orange-500 transition-all text-sm flex items-center justify-center gap-2 flex-shrink-0 disabled:opacity-50">
                              {isLoading ? <Loader2 className="animate-spin w-4 h-4" /> : <Check className="w-4 h-4" />} Simpan Perubahan
                          </button>
                      </div>
                  </div>
              )}

              {/* MODAL USER INPUT (PILIH SURAT & AYAT) */}
              {showVerseModal && activeSurahForPicker && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in zoom-in duration-200">
                    <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative text-center">
                        <button onClick={() => setShowVerseModal(false)} className="absolute top-4 right-4 p-2 bg-slate-50 dark:bg-slate-700/50 text-slate-400 hover:text-orange-500 rounded-full transition-colors"><X className="w-4 h-4" /></button>
                        <div className="w-14 h-14 bg-orange-50 dark:bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-orange-100"><BookOpen className="w-6 h-6" /></div>
                        <h3 className="text-lg sm:text-xl font-extrabold mb-1 text-slate-800 dark:text-slate-100">{activeSurahForPicker.name}</h3>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Total {activeSurahForPicker.ayahs} Ayat</p>
                        
                        <div className="flex items-center gap-3 mb-6 sm:mb-8 bg-slate-50 dark:bg-slate-900 p-2 rounded-2xl border border-slate-100 dark:border-slate-700">
                            <input ref={startVerseRef} type="number" value={verseInput.start} onChange={(e) => handleVerseInputChange('start', e.target.value)} className="w-full px-2 py-3 rounded-xl text-center text-sm font-bold text-slate-800 dark:text-slate-200 outline-none focus:ring-2 focus:ring-orange-500 bg-transparent" placeholder="Mulai (1)" />
                            <span className="font-black text-slate-300 text-lg">-</span>
                            <input type="number" value={verseInput.end} onChange={(e) => handleVerseInputChange('end', e.target.value)} className="w-full px-2 py-3 rounded-xl text-center text-sm font-bold text-slate-800 dark:text-slate-200 outline-none focus:ring-2 focus:ring-orange-500 bg-transparent" placeholder={`Sampai (${activeSurahForPicker.ayahs})`} />
                        </div>
                        <div className="space-y-3">
                            <button onClick={() => saveVerseSelection(false)} className="w-full bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl text-sm shadow-lg shadow-orange-600/30">Simpan Pilihan Ayat</button>
                            <button onClick={() => saveVerseSelection(true)} className="w-full bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold py-3.5 rounded-2xl text-sm border border-slate-200 dark:border-slate-600">Murojaah Full Satu Surat</button>
                        </div>
                    </div>
                </div>
              )}

              {/* FOOTER */}
              {currentView !== 'welcome' && (
                 <footer className="fixed bottom-0 left-0 right-0 z-50 w-full text-center py-3 sm:py-4 text-slate-400 text-[10px] sm:text-xs font-medium px-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-orange-100 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <span>&copy; {new Date().getFullYear()} Juman Jayyidin.</span>
                    <span className="hidden sm:inline">|</span>
                    <span>All rights reserved.</span>
                 </footer>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
